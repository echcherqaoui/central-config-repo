server:
  port: ${PORT}

spring:
  datasource:
    hikari:
      pool-name: HikariPool-notification
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql

  flyway:
    validate-on-migrate: true
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  kafka:
    bootstrap-servers: ${KF_SERVER_URL}
    consumer:
      group-id: ${KF_CONSUMER_GROUP_ID}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        schema.registry.url: ${SC_REGISTRY_URL}
        spring.deserializer.value.delegate.class: com.eventapp.notificationservice.kafka.deserializer.ProtobufDeserializer
        specific.protobuf.value.type: ${KF_PROTOBUF_TYPE}

app:
  mail:
    from: ${MAIL_FROM}
  security:
    hmac-secret: ${HMAC_SECURITY}
