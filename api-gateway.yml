server:
  port: ${PORT}
  reactive:
    session:
      cookie:
        name: EVENT_APP_SESSION
        path: /
        http-only: true
        secure: ${SESSION_SECURE:false} # Set to true ONLY if you add an SSL certificate/SSL termination


spring:
  session:
    store-type: redis   #BFF requirement: stores JWT in Redis session
    redis:
      namespace: "event-app:gateway"
      flush-mode: on_save
      save-mode: always
  data:
    redis:
      host: ${RD_HOST}
      port: ${RD_PORT}
      password: ${RD_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KC_CLIENT_ID}
            client-secret: ${KC_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            authorization-uri: ${KC_PUBLIC_BASE_URL}/realms/${KC_REALM}/protocol/openid-connect/auth
            token-uri: ${KC_INTERNAL_BASE_URL}/realms/${KC_REALM}/protocol/openid-connect/token
            jwk-set-uri: ${KC_INTERNAL_BASE_URL}/realms/${KC_REALM}/protocol/openid-connect/certs
            user-info-uri: ${KC_INTERNAL_BASE_URL}/realms/${KC_REALM}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true # 

          globalcors:
            add-to-simple-url-handler-mapping: true
            corsConfigurations:
              '[/**]':
                allowedOrigins: "${FRONTEND_URL}"
                allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
                allowedHeaders: ["Content-Type", "Accept", "X-Requested-With"]
                allowCredentials: true
                maxAge: 3600

          default-filters:
            - TokenRelay # Converts Session Cookie -> Bearer Token for all services

          routes:
            #  PROTECT INTERNAL ACTUATORS
            - id: block-internal-actuator
              uri: no://op
              predicates:
                - Path=/*/actuator/**
              filters:
                - SetStatus=403

            # USER SERVICE 
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**

            # Event Service
            - id: event-service
              uri: lb://event-service
              predicates:
               - Path=/api/v1/events/**

            # Booking Service
            - id: booking-service
              uri: lb://booking-service
              predicates:
                - Path=/api/v1/bookings/**

            # Payment Service
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**

            # Notification Service
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**

management:
  server:
    port: ${MANAGEMENT_PORT}

keycloak:
  admin:
    server-url: ${KC_INTERNAL_BASE_URL}
    realm: ${KC_REALM}
    client-id: ${KC_CLIENT_ID}
    client-secret: ${KC_CLIENT_SECRET}
